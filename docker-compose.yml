# version: "3.9"  ← можно удалить, это устаревший атрибут

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:  # ✅ Добавляем проверку здоровья
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s  # даём БД время на первый запуск

  init:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy  # теперь это сработает ✅
    command: >
      python3 app/init_db.py
    restart: "no"

  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      init:
        condition: service_completed_successfully  # ⚠️ требует Compose V2.20+
    restart: unless-stopped

  proxy:
    image: caddy:2
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pg_data:
  caddy_data:
  caddy_config: