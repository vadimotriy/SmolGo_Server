version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    # ports: [] # НЕ открывайте 5432 наружу! Доступ только из контейнеров

  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      init:
        condition: service_completed_successfully  # ⚠️ требует Compose V2.20+
    restart: unless-stopped

  proxy:
    image: caddy:2
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

  init:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy  # ждём, пока БД будет готова
    command: >
      python3 app/init_db.py
    restart: "no"  # не перезапускать после выполнения
    # Опционально: добавить volume, чтобы создать флаг-файл "initialized"

volumes:
  pg_data:
  caddy_data:
  caddy_config: